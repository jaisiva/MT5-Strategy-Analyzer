[pytest]

# ------------------------------------------------------------
# Test Discovery
# ------------------------------------------------------------

pythonpath = .

testpaths =
    tests

python_files =
    test_*.py

python_classes =
    Test*

python_functions =
    test_*

# ------------------------------------------------------------
# Output
# ------------------------------------------------------------

addopts =
    -ra
    -q
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------

log_cli = true

log_cli_level = INFO

log_format =
    %(asctime)s | %(levelname)-8s | %(name)s | %(message)s

log_date_format =
    %Y-%m-%d %H:%M:%S

# ------------------------------------------------------------
# Warnings
# ------------------------------------------------------------

filterwarnings =
    ignore::DeprecationWarning

# ------------------------------------------------------------
# Markers
# ------------------------------------------------------------

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    excel: Excel report tests
    loader: Loader tests
    strategy: Strategy engine tests
